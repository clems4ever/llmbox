# Example llmbox configuration. Copy to llmbox.yaml (or pass --config <path>).
# Every field is optional; omitted fields fall back to the defaults shown here.

# Single listen address for the whole server: the box-control API (/api/v1/) and
# the UI (auth pages, admin UI, health, favicon). The box-control API is
# unauthenticated by the server itself, so run behind an authenticating reverse
# proxy (e.g. oauth2-proxy) and never expose this port directly to untrusted
# networks.
http_addr: ":8080"

# External base URL the user's browser can reach the UI/API at. MUST be set
# correctly in production — it is used to build the auth-page links.
public_url: "http://localhost:8080"

# Box isolation backend: "docker" (default) runs each box as a Docker container;
# "firecracker" runs each box as a Firecracker microVM (see the firecracker block
# below and docs/firecracker.md). Empty defaults to docker, so existing
# deployments are unaffected.
backend: "docker"

# Base image launched per box (docker backend). It must bake in the standalone
# Claude binary (on PATH), tini (used as PID 1), /bin/sh, util-linux (for
# `script`), and a CA bundle. Defaults to ghcr.io/clems4ever/llmbox-box, built by
# Dockerfile.box; build your own FROM it to add more tooling. (The firecracker
# backend uses firecracker.rootfs_image instead.)
claude_image: "ghcr.io/clems4ever/llmbox-box:latest"

# Args passed to `claude remote-control`.
remote_args: "--spawn same-dir"

# How long a box may stay un-authenticated before it is reaped (Go duration).
auth_ttl: "5m"

# bbolt file persisting the auth-session registry across restarts.
state_file: "llmbox-sessions.db"

# Serve over TLS (HTTPS) directly instead of plaintext HTTP. Leave disabled (the
# default) only when a TLS-terminating reverse proxy sits in front — the
# box-control API is unauthenticated and OAuth codes are relayed through this
# server, so a loud warning is logged at startup whenever TLS is off. When
# enabled, cert_file and key_file are required (PEM certificate + matching key;
# use a full chain, leaf first, when intermediates are needed).
# tls:
#   enabled: true
#   cert_file: "/etc/llmbox/tls-cert.pem"
#   key_file: "/etc/llmbox/tls-key.pem"

# Hub-and-spoke clustering. When enabled, this server (the hub) exposes a
# /spoke/connect endpoint that remote spokes join over a WebSocket, and boxes can
# be placed on a spoke by passing its name to create_llmbox's "spoke" argument.
# Boxes with no spoke run on this host's own Docker daemon (the "local" spoke), so
# a single-host setup needs nothing here. To add a spoke:
#   1. on the hub:   llmbox spoke token create --name worker-1   # prints a one-time token
#   2. on the spoke: llmbox spoke --hub wss://<hub>/spoke/connect --token <token>
# cluster:
#   enabled: true
#   # Image shown in the admin UI's ready-to-run `docker run … spoke …` command.
#   # Display-only (it does not change how spokes run); set it to the image/tag
#   # your spokes actually use. Defaults to ghcr.io/clems4ever/granular-llmbox:latest.
#   spoke_image: "ghcr.io/clems4ever/granular-llmbox:0.0.6"

# NOTE: the `llmbox spoke` command reads NO config file — it is entirely
# flag-driven so a spoke host runs the single command the admin UI generates.
# Everything the hub configures here has a spoke flag counterpart, e.g.
# allowed_images -> --allowed-image, box.memory_mb -> --box-memory-mb,
# registries -> --registry/--registry-username/--registry-password-file. This
# `spoke:` block is therefore unused; run `llmbox-spoke --help` for the flags.

# Optional box lifecycle hooks: external executables run at box.create/destroy
# (JSON over stdin/stdout, per the hookproto contract). A hook may inject files
# into each box and persist opaque state — how integrations like granular plug
# in without llmbox depending on them.
# hooks:
#   - /opt/granular-llmbox/hook

# Container names connected into every box's OWN Docker network (boxes stay
# isolated from one another) so boxes can reach them — e.g. a hook's resource
# servers. Each must equal that container's name (set via `container_name:`).
# box_peers:
#   - granular-github
#   - granular-as

# Per-box resource caps and a ceiling on concurrent boxes. These bound resource
# exhaustion (CPU/memory/PID fork-bombs, unbounded box counts) by a caller that
# can reach the create/exec API — the box-control API is unauthenticated by
# design and meant to sit behind an authenticating proxy, so these are the host's
# last line of defence. memory_mb/cpus/pids_limit default to the finite values
# below when unset; set one high to effectively lift it. max_boxes is unlimited
# unless set.
# box:
#   memory_mb: 4096     # hard memory limit per box (MiB)
#   cpus: 2             # CPU quota per box (fractional CPUs allowed)
#   pids_limit: 4096    # max processes/threads per box (blunts fork bombs)
#   max_boxes: 0        # max concurrent boxes (0 = unlimited)
#   # Namespace scoping. Only needed when running two spokes (or a hub plus a
#   # spoke) against the SAME Docker daemon: give each a distinct namespace so
#   # they never list, reap, or destroy each other's boxes. Empty (default) means
#   # unscoped — correct when one process owns the daemon. On a spoke the
#   # --namespace flag overrides this.
#   namespace: ""

# Firecracker microVM backend settings (used only when backend: firecracker; a
# Docker deployment ignores this block). Each box boots a shared guest kernel and
# a per-box copy of the rootfs image, whose init is the llmbox agent listening on
# vsock. Build the kernel + rootfs with scripts/firecracker/ — see
# docs/firecracker.md. Host needs /dev/kvm and the firecracker binary on PATH.
# firecracker:
#   kernel_image: "/var/lib/llmbox/vmlinux"      # host path to the guest kernel (vmlinux)
#   rootfs_image: "/var/lib/llmbox/rootfs.ext4"  # default guest rootfs booted per box
#   state_dir:    "/run/llmbox/firecracker"      # per-box runtime state (empty = backend default)
#   # Egress TAP devices are provisioned once at startup (not per box), so creating
#   # a box never changes the host's network — important when a browser runs on the
#   # same host (a new interface mid-request makes Chrome abort with
#   # ERR_NETWORK_CHANGED). pool_size caps concurrent networked boxes.
#   pool_size:      16                           # 0 = backend default (16)
#   # disable_egress: true                       # control-only boxes (no TAP/NAT); runs unprivileged but no outbound network

# Credentials for pulling box images from authenticated container registries.
# Each entry is matched against the image's registry host: an image whose host
# has an entry is pulled with these credentials, any other image is pulled
# anonymously (as before). Use "docker.io" for Docker Hub images (which carry no
# host prefix). As with other secrets, the password/token is read from a file and
# never inlined here. On a spoke, configure this where the box image is pulled.
# registries:
#   - registry: "ghcr.io"
#     username: "your-github-user"
#     password_file: "/etc/llmbox/ghcr-token"   # a GitHub PAT with read:packages

# Expose box HTTP ports to the user's browser. When base_domain is set, the hub
# serves a reverse proxy at https://<slug>.<base_domain>/ for every proxy enabled
# over MCP (create_llmbox_proxy) or the admin UI, forwarding to the box's port on
# its spoke. No port is reachable until a proxy is explicitly enabled (default
# deny). Each proxy gets its OWN sub-domain so single-page apps and servers that
# emit absolute paths work unchanged (no path rewriting). Requires:
#   - a wildcard DNS record   *.proxy.example.com  ->  this host
#   - a wildcard TLS cert for *.proxy.example.com  (terminated at your proxy)
# A box on the local spoke is proxied with a live (streaming) connection; a box on
# a remote spoke is forwarded over the cluster transport with buffered
# request/response (ordinary HTTP and SPAs work; WebSocket/SSE streaming to a
# remote box does not).
# proxy:
#   base_domain: "proxy.example.com"

# Activation authentication. Without this, anyone who obtains a box's auth-page
# URL (which is relayed through the chatbot) can activate the box with their own
# account. Enable a provider to require the person activating a box to sign in
# first — over a channel that never passes through the chatbot — and be in an
# allowed domain or email allowlist.
# auth:
#   session_ttl: "1h"          # how long a sign-in stays valid
#   # Share one sign-in across sub-domains, so the login that gates box activation
#   # also covers the per-proxy <slug>.proxy.example.com hosts. Set it to the
#   # parent domain both hosts share (note the leading dot). Leave unset unless you
#   # use the proxy feature above with sub-domain hosts.
#   cookie_domain: ".example.com"
#   google:
#     enabled: true
#     client_id: "xxxxxxxx.apps.googleusercontent.com"
#     # Secret is read from this file, never inlined here. Register the redirect
#     # URI {public_url}/auth/google/callback in the Google Cloud console.
#     client_secret_file: "/etc/llmbox/google-client-secret"
#     # redirect_url defaults to {public_url}/auth/google/callback
#     allowed_domains: ["your-company.com"]   # Google Workspace domain(s)
#     allowed_emails: []                       # or specific addresses
#   # Identities allowed into the admin web UI (/admin) to manage spokes and
#   # boxes. Independent of the activation allow rule above. Empty disables /admin.
#   admin:
#     emails: ["you@your-company.com"]
