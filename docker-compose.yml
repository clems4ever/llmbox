# The only service is llmbox-mcp: the MCP + auth server. A chatbot calls it to
# create sandboxed Claude boxes, each authenticated by the end user in a browser.
# The server bakes in the standalone Claude binary and injects it into every box
# at creation, so boxes run on a plain base image (LLMBOX_CLAUDE_IMAGE) — there
# is no separate Claude image to build:
#
#   docker compose up --build               # build + run llmbox-mcp
services:
  llmbox-mcp:
    build:
      context: .
    image: llmbox-mcp
    ports:
      - "8080:8080"
    environment:
      # MUST be the URL the user's browser can reach this server at.
      LLMBOX_PUBLIC_URL: ${LLMBOX_PUBLIC_URL:-http://localhost:8080}
      # Base image launched per box. Any glibc image with /bin/sh, util-linux
      # (for `script`), and CA certificates works — Claude is injected, not baked.
      LLMBOX_CLAUDE_IMAGE: ${LLMBOX_CLAUDE_IMAGE:-debian:bookworm-slim}
      LLMBOX_AUTH_TTL_SECONDS: ${LLMBOX_AUTH_TTL_SECONDS:-300}
      # bbolt file persisting the auth-session registry across restarts. Lives on
      # the mounted volume below so sessions survive container recreation.
      LLMBOX_STATE_FILE: /var/lib/llmbox/sessions.db
      # Optional box lifecycle hooks. LLMBOX_HOOKS is an OS-path-list of external
      # executables llmbox runs at box.create/box.destroy (JSON over stdin/stdout,
      # per the hookproto contract); a hook may inject files into each box and
      # persist opaque state. This is how integrations like granular plug in
      # WITHOUT llmbox depending on them — see github.com/clems4ever/granular-llmbox
      # and the README's "Box lifecycle hooks" section. The hook binary must be
      # present in this container (bake it into a derived image or mount it in).
      LLMBOX_HOOKS: ${LLMBOX_HOOKS:-}
      # Container names connected into every box's OWN Docker network (boxes stay
      # isolated from one another) so boxes can reach them — e.g. a hook's resource
      # servers. Comma-separated; each must equal that container's name (set via
      # `container_name:`). e.g. "granular-github,granular-as".
      LLMBOX_BOX_PEERS: ${LLMBOX_BOX_PEERS:-}
    volumes:
      # Needed to create/destroy boxes.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persists the session registry (LLMBOX_STATE_FILE above).
      #
      # IMPORTANT: the image runs as the distroless "nonroot" user (UID/GID
      # 65532), so this host directory must be writable by that UID or the
      # server crash-loops with "permission denied" opening the store:
      #   mkdir -p ./data/llmbox && sudo chown -R 65532:65532 ./data/llmbox
      - ./data/llmbox:/var/lib/llmbox
    # The image runs as non-root; grant it the docker socket's group so it can
    # use the socket. Put the gid in a local .env file:
    #   DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped
