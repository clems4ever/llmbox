# Two services: llmbox (the box-control + auth server) and llmbox-mcp (the
# stand-alone MCP front-end that forwards MCP tool calls to llmbox's box-control
# API). A chatbot connects to llmbox-mcp; llmbox does the real work, creating
# sandboxed Claude boxes each authenticated by the end user in a browser. The
# server bakes in the standalone Claude binary and injects it into every box at
# creation, so boxes run on a plain base image — there is no separate Claude
# image to build:
#
#   docker compose up --build               # build + run both services
services:
  llmbox:
    build:
      context: .
    image: llmbox
    ports:
      # The whole server on one port: the UI (auth pages, admin, health) and the
      # box-control API (/api/v1/). Put behind an authenticating proxy before
      # exposing it; llmbox-mcp reaches it over the compose network as
      # http://llmbox:8080.
      - "8080:8080"
    # llmbox reads a single YAML config file (see llmbox.example.yaml). Mount
    # your config to /etc/llmbox/llmbox.yaml and point the server at it. At a
    # minimum set public_url (the URL the user's browser can reach this server
    # at) and state_file: /var/lib/llmbox/sessions.db so sessions land on the
    # mounted volume below and survive container recreation. Box lifecycle hooks
    # and box_peers are configured in the same file — see the README.
    command: ["--config", "/etc/llmbox/llmbox.yaml"]
    volumes:
      # The YAML config (copy llmbox.example.yaml and edit it).
      - ./llmbox.yaml:/etc/llmbox/llmbox.yaml:ro
      # If you enable auth.google, mount the OAuth client secret read-only at the
      # path your config's client_secret_file points to. Keep it out of the image.
      #   - ./google-client-secret:/etc/llmbox/google-client-secret:ro
      # Needed to create/destroy boxes.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persists the session registry (LLMBOX_STATE_FILE above).
      #
      # IMPORTANT: the image runs as the distroless "nonroot" user (UID/GID
      # 65532), so this host directory must be writable by that UID or the
      # server crash-loops with "permission denied" opening the store:
      #   mkdir -p ./data/llmbox && sudo chown -R 65532:65532 ./data/llmbox
      - ./data/llmbox:/var/lib/llmbox
    # The image runs as non-root; grant it the docker socket's group so it can
    # use the socket. Put the gid in a local .env file:
    #   DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped

  # Stand-alone MCP server: serves the MCP tools and forwards every call to the
  # llmbox box-control API over the compose network. It holds no state and needs
  # no Docker socket — add its URL (http://<host>:8082/, streamable HTTP) as a
  # remote MCP server in your chatbot. Put it behind an authenticating proxy
  # before exposing it, just like the box-control API it fronts.
  llmbox-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: llmbox-mcp
    depends_on:
      - llmbox
    ports:
      - "8082:8082"
    # Mint the key on the hub: docker compose exec llmbox /llmbox-server apikey add --name mcp
    # then put it in .env as LLMBOX_API_KEY=lbx_...
    environment:
      LLMBOX_API_KEY: ${LLMBOX_API_KEY:-}
    command: ["--upstream", "http://llmbox:8080", "--addr", ":8082"]
    restart: unless-stopped
