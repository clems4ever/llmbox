name: CI

# Runs the Go test suite with coverage on every push and pull request. On pushes
# to main it also generates a coverage badge and commits it to an orphan
# `badges` branch (using the built-in GITHUB_TOKEN — no external service), which
# the README badge points at. Integration tests (the //go:build integration set,
# which need a Docker daemon and a real Claude binary) are excluded here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          rounded=$(printf '%.0f' "$pct")
          color=red
          if   [ "$rounded" -ge 80 ]; then color=brightgreen
          elif [ "$rounded" -ge 60 ]; then color=yellow
          elif [ "$rounded" -ge 40 ]; then color=orange
          fi
          curl -fsSL "https://img.shields.io/badge/coverage-${pct}%25-${color}" -o /tmp/coverage.svg

          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          workdir=$(mktemp -d)
          if ! git clone --depth=1 --branch badges "$repo_url" "$workdir" 2>/dev/null; then
            git clone --depth=1 "$repo_url" "$workdir"
            git -C "$workdir" checkout --orphan badges
            git -C "$workdir" rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$workdir/.badges"
          cp /tmp/coverage.svg "$workdir/.badges/coverage.svg"
          git -C "$workdir" config user.name  "github-actions[bot]"
          git -C "$workdir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$workdir" add .badges/coverage.svg
          if ! git -C "$workdir" diff --cached --quiet; then
            git -C "$workdir" commit -m "ci: update coverage badge (${pct}%)"
            git -C "$workdir" push origin badges
          fi
