name: CI

# Runs the Go test suite with coverage on every push and pull request. On pushes
# to main it also regenerates the coverage badge (.github/badges/coverage.svg)
# and commits it back to main — the README references it by relative path, so it
# renders against whichever branch is being viewed. The commit carries [skip ci]
# so it does not re-trigger this workflow. Integration tests (the //go:build
# integration set, which need a Docker daemon and a real Claude binary) are
# excluded here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          rounded=$(printf '%.0f' "$pct")
          color=red
          if   [ "$rounded" -ge 80 ]; then color=brightgreen
          elif [ "$rounded" -ge 60 ]; then color=yellow
          elif [ "$rounded" -ge 40 ]; then color=orange
          fi
          mkdir -p .github/badges
          curl -fsSL "https://img.shields.io/badge/coverage-${pct}%25-${color}" -o .github/badges/coverage.svg

          if git diff --quiet -- .github/badges/coverage.svg; then
            echo "coverage badge unchanged ($pct%)"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git commit -m "ci: update coverage badge (${pct}%) [skip ci]"
          # Rebase onto any commits that landed since checkout, then push to main.
          git pull --rebase --autostash origin main
          git push origin HEAD:main
