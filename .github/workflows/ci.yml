name: CI

# Runs the Go test suite with coverage on every push and pull request, then —
# once the unit and e2e jobs are green — builds the container images (and pushes
# them on non-PR events). Keeping tests and the image build in one workflow means
# the suite runs once per event and `build-push` gates on it via `needs:`, rather
# than each workflow re-running its own copy of the tests.
#
# On pull requests the `test` job also regenerates the coverage badge
# (.github/badges/coverage.svg) and commits it onto the PR branch — so it lands
# in the PR diff and reaches main through the merge, rather than via a direct
# push to main (which the branch-protection ruleset forbids). The README
# references the badge by relative path, so it renders against whichever branch
# is being viewed. The commit carries [skip ci] so it does not re-trigger this
# workflow. Integration tests (the //go:build integration set, which need a
# Docker daemon) are excluded here.
#
# The end-to-end workflow test (the //go:build e2e set) runs in its own `e2e`
# job, kept separate from the fast unit suite: it drives the auth UI through a
# real headless Chrome via WebDriver, simulating the Docker and Anthropic layers.
#
# Tag pushes (v*) and main pushes skip the PR-only badge/screenshot side effects
# but still run tests and build-push, so a tagged release is never published
# untested.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the PR's head branch (not the detached merge ref) so the
          # refreshed coverage badge can be committed back onto it. head_ref is
          # empty on push events, where checkout falls back to the pushed ref.
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the admin web app
        # The dist under internal/hub/webdist is generated, not committed (only
        # its .gitkeep is tracked), and the hub embeds + serves it — so it must
        # exist before `go test` (TestAdminSPAServed) and before the binaries
        # are compiled.
        run: |
          cd web
          npm ci
          npm run build

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Web unit tests with coverage
        # The admin SPA (web/) has its own Vitest suite. Its line-coverage total
        # drives the separate "ui coverage" badge below. --run is implied by the
        # coverage script (vitest run --coverage).
        run: cd web && npm run coverage

      - name: Refresh coverage badges on the PR branch
        # Regenerate the Go and UI coverage badges from this PR's coverage and
        # commit them onto the PR branch (so they land in the PR diff and reach
        # main through the merge) rather than pushing straight to main, which the
        # branch-protection ruleset forbids. The commit is made via the GraphQL
        # API (commit-signed.sh) so GitHub signs it — the signed-commits ruleset
        # rejects the unsigned commit a plain `git push` would produce here.
        # Same-repo PRs only: fork PRs get a read-only GITHUB_TOKEN and cannot
        # push. [skip ci] avoids re-triggering CI.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          # Pick a shields.io colour from a rounded percentage.
          badge_color() {
            local r; r=$(printf '%.0f' "$1")
            if   [ "$r" -ge 80 ]; then echo brightgreen
            elif [ "$r" -ge 60 ]; then echo yellow
            elif [ "$r" -ge 40 ]; then echo orange
            else echo red
            fi
          }
          gopct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          uipct=$(node -p "require('./web/coverage/coverage-summary.json').total.lines.pct")

          mkdir -p .github/badges
          curl -fsSL "https://img.shields.io/badge/coverage-${gopct}%25-$(badge_color "$gopct")" \
            -o .github/badges/coverage.svg
          curl -fsSL "https://img.shields.io/badge/ui%20coverage-${uipct}%25-$(badge_color "$uipct")" \
            -o .github/badges/ui-coverage.svg

          changed=$(git status --porcelain -- .github/badges | awk '{print $NF}')
          if [ -z "$changed" ]; then
            echo "coverage badges unchanged (go ${gopct}%, ui ${uipct}%)"
            exit 0
          fi
          .github/scripts/commit-signed.sh \
            "ci: update coverage badges (go ${gopct}%, ui ${uipct}%) [skip ci]" \
            $changed >/dev/null

  e2e:
    name: E2E (WebDriver)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On pull requests, check out the PR's head branch itself (not the
          # detached merge ref) so the refreshed screenshots can be committed
          # back onto it. github.head_ref is empty on push events, where checkout
          # falls back to the pushed ref.
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the admin web app
        # The browser tests drive the SPA the hub embeds from
        # internal/hub/webdist, which is generated, not committed.
        run: |
          cd web
          npm ci
          npm run build

      - name: Set up Chrome and ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Pin and verify Chrome and ChromeDriver for the test
        # The runner image preinstalls its own chromedriver (via $CHROMEWEBDRIVER);
        # override both so the test uses the matched pair this action installed.
        #
        # Prefer the action's outputs, but fall back to $PATH (the action also
        # installs both there) so an empty/renamed output does not silently leave
        # CHROMEWEBDRIVER as "." — which made findChromeDriver() fail, the e2e
        # test t.Skip, and the screenshot/README refresh never happen while CI
        # stayed green. Fail fast with the resolved paths if either is missing.
        run: |
          set -euo pipefail
          chrome='${{ steps.setup-chrome.outputs.chrome-path }}'
          driver='${{ steps.setup-chrome.outputs.chromedriver-path }}'
          [ -n "$chrome" ] || chrome="$(command -v google-chrome || command -v chrome || true)"
          [ -n "$driver" ] || driver="$(command -v chromedriver || true)"
          if [ -z "$chrome" ] || [ ! -x "$chrome" ]; then
            echo "::error::Chrome not found (chrome-path='${{ steps.setup-chrome.outputs.chrome-path }}', resolved='$chrome')"
            exit 1
          fi
          if [ -z "$driver" ] || [ ! -x "$driver" ]; then
            echo "::error::ChromeDriver not found (chromedriver-path='${{ steps.setup-chrome.outputs.chromedriver-path }}', resolved='$driver')"
            exit 1
          fi
          echo "CHROME_BIN=$chrome" >> "$GITHUB_ENV"
          echo "CHROMEWEBDRIVER=$(dirname "$driver")" >> "$GITHUB_ENV"
          "$chrome" --version
          "$driver" --version

      - name: Run end-to-end workflow test
        run: make test-e2e
        env:
          # The test saves screenshots of the sign-in page here when this is set.
          LLMBOX_E2E_SCREENSHOT_DIR: .github/screenshots

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: .github/screenshots/*.png
          if-no-files-found: ignore

      - name: Refresh screenshots on the PR branch and post a preview comment
        # Capture happens in the e2e test above. When the screenshots changed we
        # commit them back onto the PR branch (so they land in the PR diff and get
        # reviewed alongside the UI change) and post/update a sticky comment that
        # previews the changed images inline, so a reviewer sees the new UI without
        # opening the binary files — rather than committing straight to main.
        #
        # Same-repo PRs only: fork PRs get a read-only GITHUB_TOKEN and cannot push
        # or comment, so we skip this for them (the e2e test still runs and gates
        # the PR). [skip ci] on the bot's own commit avoids re-triggering CI.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          changed=$(git status --porcelain -- .github/screenshots | awk '{print $NF}')
          if [ -z "$changed" ]; then
            echo "auth-page screenshots unchanged"
            exit 0
          fi
          echo "changed screenshots:"; echo "$changed"

          # Commit via the GraphQL API (commit-signed.sh) so GitHub signs the
          # commit, as the branch's signed-commits ruleset requires; $changed is
          # unquoted so each path becomes a separate argument. The new commit's
          # SHA (used to pin the preview images below) is returned on stdout.
          sha=$(.github/scripts/commit-signed.sh \
            "ci: refresh auth-page screenshots [skip ci]" $changed)

          # Build a sticky preview comment. Images are pinned to the new commit
          # SHA so the comment always shows exactly what was committed, and each
          # links to the file on the branch.
          repo="${{ github.repository }}"
          marker="<!-- auth-screenshot-preview -->"
          {
            echo "$marker"
            echo "### 📸 Auth-page screenshots updated"
            echo
            echo "The e2e test regenerated these from this PR's UI (commit \`${sha:0:7}\`):"
            echo
            for f in $changed; do
              name=$(basename "$f")
              echo "**$name**"
              echo
              echo "[![$name](https://raw.githubusercontent.com/$repo/$sha/.github/screenshots/$name)](https://github.com/$repo/blob/$sha/.github/screenshots/$name)"
              echo
            done
          } > /tmp/screenshot-comment.md

          pr="${{ github.event.pull_request.number }}"
          id=$(gh api "repos/$repo/issues/$pr/comments" --paginate \
                 --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n1 || true)
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$repo/issues/comments/$id" -F body=@/tmp/screenshot-comment.md >/dev/null
            echo "updated screenshot preview comment $id"
          else
            gh api -X POST "repos/$repo/issues/$pr/comments" -F body=@/tmp/screenshot-comment.md >/dev/null
            echo "created screenshot preview comment"
          fi

  # The Docker-backed conformance suite. It builds a box image and runs the same
  # backend-neutral box contract (internal/spoke/box/conformance) against real
  # containers, validating the Docker provisioner, the per-box socket bind-mount,
  # the in-container guest, and the login-free Init/Exec/Dial control protocol
  # (create/exec/destroy).
  # ubuntu-latest has a Docker daemon, so this needs no special runner. The
  # Firecracker backend would reuse the same conformance.Run on a KVM-capable
  # self-hosted runner.
  integration-docker:
    name: Integration (Docker conformance)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Docker conformance
        run: go test -tags=integration -run TestDockerConformance -v ./internal/spoke/docker/

  # Build the images once the test, e2e, and integration jobs are green. Builds
  # both images on every event but only logs in / pushes for non-PR events
  # (branch, tag, dispatch); PRs build to validate the Dockerfiles without
  # publishing.
  build-push:
    name: Build and push images
    needs: [test, e2e, integration-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: llmbox
            dockerfile: Dockerfile
          - name: llmbox-box
            dockerfile: Dockerfile.box
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push for non-PR events. PRs build but don't push.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
