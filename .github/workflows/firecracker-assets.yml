name: Firecracker assets

# Build and publish the prebuilt Firecracker guest images to GHCR as opaque OCI
# artifacts (pushed with oras, NOT runnable images — Firecracker boots the raw
# files), so a spoke can run `llmbox-spoke firecracker` with no image
# flags and pull everything prebuilt:
#
#   llmbox-fc-base    the multi-GiB Debian base rootfs (no guest) — slow, rarely
#                     changes: content-addressed by input hash, skip-on-hit.
#   llmbox-fc-kernel  the full guest kernel — slow (~15 min) but very rare:
#                     content-addressed by input hash, skip-on-hit.
#   llmbox-fc-payload the tiny guest drive — changes every commit, so it
#                     is (re)published on every push to main, tagged :latest.
#
# The expensive jobs gate themselves on a cache hit rather than on a paths filter,
# so an unrelated commit costs only a manifest lookup. The spoke's resolver pulls
# :latest by default (override with LLMBOX_FC_TAG / LLMBOX_FC_REGISTRY).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  base-rootfs:
    name: Base rootfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and publish the base rootfs (skip if already cached)
        run: |
          set -euo pipefail
          ref="$REGISTRY/llmbox-fc-base:$(scripts/firecracker/asset-key.sh base)"
          if oras manifest fetch "$ref" >/dev/null 2>&1; then
            echo "base rootfs already published at $ref — nothing to build"; exit 0
          fi
          echo "building $ref"
          OUT="$PWD/fc-assets" scripts/firecracker/build-base-rootfs.sh
          cd fc-assets
          oras push "$ref" --artifact-type application/vnd.llmbox.fc-base \
            base-rootfs.ext4:application/vnd.llmbox.rootfs.ext4
          oras tag "$ref" latest
          echo "published $ref (and :latest)"

  kernel:
    name: Guest kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and publish the guest kernel (skip if already cached)
        run: |
          set -euo pipefail
          ref="$REGISTRY/llmbox-fc-kernel:$(scripts/firecracker/asset-key.sh kernel)"
          if oras manifest fetch "$ref" >/dev/null 2>&1; then
            echo "kernel already published at $ref — nothing to build"; exit 0
          fi
          echo "building $ref (this takes a while)"
          OUT="$PWD/fc-assets" scripts/firecracker/build-kernel.sh
          cd fc-assets
          # Publish under the generic name the resolver expects.
          cp vmlinux-full vmlinux
          oras push "$ref" --artifact-type application/vnd.llmbox.fc-kernel \
            vmlinux:application/vnd.llmbox.kernel
          oras tag "$ref" latest
          echo "published $ref (and :latest)"

  payload:
    name: Guest payload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and publish the guest payload
        # The payload tracks the guest (which changes every commit), so it is always
        # rebuilt and republished, tagged :latest (what the spoke pulls by default)
        # and :<sha> for pinning.
        run: |
          set -euo pipefail
          OUT="$PWD/fc-assets" scripts/firecracker/build-payload-drive.sh
          cd fc-assets
          ref="$REGISTRY/llmbox-fc-payload"
          oras push "$ref:${GITHUB_SHA}" --artifact-type application/vnd.llmbox.fc-payload \
            payload.ext4:application/vnd.llmbox.payload.ext4
          oras tag "$ref:${GITHUB_SHA}" latest
          echo "published $ref:${GITHUB_SHA} (and :latest)"
