name: Build and push images

# Builds the images and pushes them to GitHub Container Registry:
#   - llmbox     : the MCP server that manages the boxes (Dockerfile). It bakes in
#                  the standalone Claude binary and injects it into each box at
#                  creation, so there is no separate Claude image to build.
#   - llmbox-box : the default base image launched per box (Dockerfile.box) —
#                  debian:bookworm-slim plus ca-certificates / util-linux. It is
#                  the default `claude_image`; Claude is injected, not baked in.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Gate the publish on a green test run. These mirror ci.yml's test/e2e jobs but
  # without its main-only side effects (coverage badge, screenshot commits): here
  # they exist only so build-push can `needs:` them. They also run on tag pushes,
  # which ci.yml does not cover, so a tagged release is never published untested.
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  e2e:
    name: E2E (WebDriver)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Chrome and ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Pin and verify Chrome and ChromeDriver for the test
        # The runner image preinstalls its own chromedriver (via $CHROMEWEBDRIVER);
        # override both so the test uses the matched pair this action installed.
        # Fall back to $PATH so an empty output never leaves CHROMEWEBDRIVER as "."
        # (which would make findChromeDriver() fail and the e2e test silently skip).
        run: |
          set -euo pipefail
          chrome='${{ steps.setup-chrome.outputs.chrome-path }}'
          driver='${{ steps.setup-chrome.outputs.chromedriver-path }}'
          [ -n "$chrome" ] || chrome="$(command -v google-chrome || command -v chrome || true)"
          [ -n "$driver" ] || driver="$(command -v chromedriver || true)"
          if [ -z "$chrome" ] || [ ! -x "$chrome" ]; then
            echo "::error::Chrome not found (resolved='$chrome')"; exit 1
          fi
          if [ -z "$driver" ] || [ ! -x "$driver" ]; then
            echo "::error::ChromeDriver not found (resolved='$driver')"; exit 1
          fi
          echo "CHROME_BIN=$chrome" >> "$GITHUB_ENV"
          echo "CHROMEWEBDRIVER=$(dirname "$driver")" >> "$GITHUB_ENV"
          "$chrome" --version
          "$driver" --version

      - name: Run end-to-end workflow test
        run: make test-e2e

  build-push:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: llmbox
            dockerfile: Dockerfile
          - name: llmbox-box
            dockerfile: Dockerfile.box
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push for non-PR events. PRs build but don't push.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
