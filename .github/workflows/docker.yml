name: Build and push images

# Builds two independent images and pushes them to GitHub Container Registry:
#   - claude-remote : Claude Code in remote-control mode (Dockerfile.claude)
#   - llmbox-mcp    : the MCP server that manages those containers (Dockerfile.mcp)
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: claude-remote
            dockerfile: Dockerfile.claude
          - name: llmbox-mcp
            dockerfile: Dockerfile.mcp
    steps:
      # Check out the main repo WITHOUT submodules and without persisting the
      # job token in .git/config — otherwise checkout rewrites the granular
      # submodule's SSH URL to HTTPS+token and bypasses the deploy key below.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # granular is a private submodule. Fetch it over SSH with a read-only
      # deploy key scoped to that repo (GRANULAR_DEPLOY_KEY holds the private
      # key; its public half is registered as a deploy key on granular).
      - name: Fetch private submodule
        env:
          DEPLOY_KEY: ${{ secrets.GRANULAR_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/granular
          chmod 600 ~/.ssh/granular
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/granular -o IdentitiesOnly=yes" \
            git submodule update --init --recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push for non-PR events. PRs build but don't push.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
