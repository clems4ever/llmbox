name: Bump Claude version

# Resolves the latest stable Claude Code release and, when it differs from the
# version pinned in Dockerfile.box (ARG CLAUDE_VERSION), opens (or updates) a PR
# bumping it. Runs daily and on demand. The branch is reused, so at most one open
# bump PR exists at a time.
#
# Note: PRs opened with the default GITHUB_TOKEN do not themselves trigger other
# workflows (so the image build won't run on the bump PR). To have CI run on the
# PR, pass a fine-grained PAT as the `token:` input below instead.
on:
  schedule:
    - cron: "0 7 * * *" # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve versions
        id: ver
        run: |
          set -euo pipefail
          current="$(grep -oP '^ARG CLAUDE_VERSION=\K.*' Dockerfile.box)"
          latest="$(curl -fsSL https://downloads.claude.ai/claude-code-releases/stable)"
          if [[ ! "$latest" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "unexpected version response: '$latest'" >&2
            exit 1
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to the latest stable ($current)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pinned $current; latest stable is $latest."
          fi

      - name: Update Dockerfile.box
        if: steps.ver.outputs.changed == 'true'
        run: sed -i "s/^ARG CLAUDE_VERSION=.*/ARG CLAUDE_VERSION=${{ steps.ver.outputs.latest }}/" Dockerfile.box

      - name: Create pull request
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-claude-version
          delete-branch: true
          commit-message: "build: bump pinned Claude version to ${{ steps.ver.outputs.latest }}"
          title: "build: bump pinned Claude version to ${{ steps.ver.outputs.latest }}"
          labels: dependencies
          body: |
            Automated bump of the pinned Claude Code version baked into the llmbox box image.

            - Previously pinned: `${{ steps.ver.outputs.current }}`
            - Latest stable: `${{ steps.ver.outputs.latest }}`

            Source: <https://downloads.claude.ai/claude-code-releases/stable>
