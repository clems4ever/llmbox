name: Bump Claude version

# Resolves the latest stable Claude Code release and, when it differs from the
# version pinned in the Dockerfile (ARG CLAUDE_VERSION), opens (or updates) a PR
# bumping it. Runs daily and on demand. The branch is reused, so at most one open
# bump PR exists at a time.
#
# Note: configure a fine-grained PAT in `secrets.BUMP_CLAUDE_TOKEN` to let this
# workflow open/update the bump PR. The default GITHUB_TOKEN can be blocked from
# creating PRs by repository settings and, even when allowed, won't trigger other
# workflows from the created PR.
on:
  schedule:
    - cron: "0 7 * * *" # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve versions
        id: ver
        run: |
          set -euo pipefail
          current="$(grep -oP '^ARG CLAUDE_VERSION=\K.*' Dockerfile)"
          latest="$(curl -fsSL https://downloads.claude.ai/claude-code-releases/stable)"
          if [[ ! "$latest" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "unexpected version response: '$latest'" >&2
            exit 1
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to the latest stable ($current)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pinned $current; latest stable is $latest."
          fi

      - name: Update Dockerfile
        if: steps.ver.outputs.changed == 'true'
        run: sed -i "s/^ARG CLAUDE_VERSION=.*/ARG CLAUDE_VERSION=${{ steps.ver.outputs.latest }}/" Dockerfile

      - name: Check PR token availability
        if: steps.ver.outputs.changed == 'true'
        id: token
        env:
          BUMP_CLAUDE_TOKEN: ${{ secrets.BUMP_CLAUDE_TOKEN }}
        run: |
          if [ -n "$BUMP_CLAUDE_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.ver.outputs.changed == 'true' && steps.token.outputs.configured == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BUMP_CLAUDE_TOKEN }}
          branch: bump-claude-version
          delete-branch: true
          commit-message: "build: bump pinned Claude version to ${{ steps.ver.outputs.latest }}"
          title: "build: bump pinned Claude version to ${{ steps.ver.outputs.latest }}"
          labels: dependencies
          body: |
            Automated bump of the pinned Claude Code version baked into the llmbox image.

            - Previously pinned: `${{ steps.ver.outputs.current }}`
            - Latest stable: `${{ steps.ver.outputs.latest }}`

            Source: <https://downloads.claude.ai/claude-code-releases/stable>

      - name: Skip PR creation (missing BUMP_CLAUDE_TOKEN)
        if: steps.ver.outputs.changed == 'true' && steps.token.outputs.configured != 'true'
        run: |
          echo "::warning::Latest Claude version was found (${{ steps.ver.outputs.latest }}), but no BUMP_CLAUDE_TOKEN secret is configured; skipping PR creation."
